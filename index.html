<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍱 午餐忍者</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Silkscreen&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --green:#4caf50; --yellow:#ffe066; --red:#e53935;
  --bg:#111a11; --panel:rgba(0,0,0,0.6);
}
body {
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Noto Sans TC',sans-serif;
  overflow:hidden;
}
#gameWrapper {
  position:relative;
  width:min(700px,100vw);
  height:min(640px,100vh);
  background:linear-gradient(160deg,#0d1f0d 0%,#1a3a1a 55%,#0d1f0d 100%);
  border-radius:16px;
  overflow:hidden; cursor:none; user-select:none;
  box-shadow:0 0 60px rgba(76,175,80,.15),0 0 0 1px rgba(76,175,80,.2);
}
#gameCanvas { display:block; width:100%; height:100%; }
#hud {
  position:absolute; top:0; left:0; right:0;
  padding:10px 14px 8px;
  background:linear-gradient(180deg,rgba(0,0,0,.78) 0%,transparent 100%);
  pointer-events:none;
  display:flex; flex-direction:column; gap:5px;
}
#hudRow1 { display:flex; align-items:center; gap:10px; }
#scoreBox {
  background:rgba(0,0,0,.5); border:1px solid rgba(255,220,100,.3);
  border-radius:8px; padding:4px 12px; text-align:center; flex-shrink:0;
}
#scoreBox .lbl { font-size:10px; color:#aaa; letter-spacing:.08em; }
#scoreBox .val { font-size:20px; font-weight:900; color:var(--yellow); font-family:'Silkscreen',monospace; }
#livesBox {
  display:flex; gap:3px; align-items:center;
  background:rgba(0,0,0,.5); border-radius:8px; padding:6px 10px;
  border:1px solid rgba(255,255,255,.1); flex-shrink:0;
}
.heart { font-size:18px; }
#nutriBar { flex:1; display:flex; flex-direction:column; gap:3px; }
#nutriLabel { display:flex; justify-content:space-between; align-items:center; }
#nutriLabel span { font-size:11px; color:#9f9; letter-spacing:.05em; }
#nutriPct { font-size:11px; font-weight:700; color:var(--yellow); }
#nutriTrack {
  height:14px; background:rgba(255,255,255,.1);
  border-radius:7px; overflow:hidden;
  border:1px solid rgba(76,175,80,.3); position:relative;
}
#nutriFill {
  height:100%; width:0%; border-radius:7px;
  background:linear-gradient(90deg,#2e7d32,#66bb6a,#ffe066);
  transition:width .4s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(102,187,106,.6);
}
#nutriFood {
  position:absolute; right:6px; top:50%;
  transform:translateY(-50%);
  font-size:10px; color:rgba(255,255,255,.6);
  pointer-events:none; white-space:nowrap; max-width:60%;
  overflow:hidden; text-overflow:ellipsis;
}
#wasteRow { display:flex; align-items:center; gap:8px; }
#wasteLabel { font-size:10px; color:#f88; letter-spacing:.05em; flex-shrink:0; }
#wasteTrack {
  flex:1; height:8px; background:rgba(255,255,255,.08);
  border-radius:4px; overflow:hidden;
  border:1px solid rgba(200,80,80,.25);
}
#wasteFill {
  height:100%; width:0%; border-radius:4px;
  background:linear-gradient(90deg,#b71c1c,#ef5350);
  transition:width .4s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 6px rgba(239,83,80,.5);
}
#wasteCount { font-size:10px; color:#f88; flex-shrink:0; min-width:44px; text-align:right; }
#infoPanel {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(0deg,rgba(0,0,0,.88) 0%,transparent 100%);
  padding:14px 18px 16px; pointer-events:none; display:none;
}
#infoTitle { font-size:15px; font-weight:700; color:var(--yellow); margin-bottom:3px; }
#infoText  { font-size:12px; color:#ccc; line-height:1.5; }
#comboDisplay {
  position:absolute; top:48%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; font-size:42px; font-weight:900;
  color:var(--yellow); text-shadow:0 0 24px #f90,2px 2px 0 #a00;
  opacity:0; transition:opacity .25s; white-space:nowrap;
}
#flashOverlay {
  position:absolute; inset:0; pointer-events:none;
  border-radius:16px; border:5px solid transparent;
  transition:border-color .1s,background .1s;
}
#overlay {
  position:absolute; inset:0;
  background:rgba(5,15,5,.93); border-radius:16px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; padding:28px;
}
#overlay h1 {
  font-size:28px; font-weight:900; color:var(--yellow);
  text-shadow:0 0 24px #f90; text-align:center; line-height:1.3;
}
#overlay .subtitle { font-size:13px; color:#aaa; text-align:center; max-width:360px; line-height:1.8; }
.legend-row { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-top:2px; }
.ltag { font-size:11px; border-radius:20px; padding:3px 12px; border:1px solid rgba(255,255,255,.12); }
.ltag.green  { background:rgba(76,175,80,.2);  color:#9f9; }
.ltag.yellow { background:rgba(249,168,37,.2); color:#fc6; }
.ltag.gray   { background:rgba(136,136,136,.2);color:#bbb; }
.ltag.red    { background:rgba(200,50,50,.2);  color:#f88; }
.btn {
  font-size:16px; font-weight:700; border:none; border-radius:30px;
  padding:11px 36px; cursor:pointer; letter-spacing:.04em;
  transition:transform .1s,box-shadow .1s;
}
.btn:hover { transform:scale(1.06); }
.btn-green { background:var(--green); color:#fff; box-shadow:0 4px 18px rgba(76,175,80,.4); }
.btn-blue  { background:#1976d2; color:#fff; box-shadow:0 4px 18px rgba(25,118,210,.4); }
#endBoard {
  color:#fff; text-align:center; font-size:13px; line-height:2;
  background:rgba(0,0,0,.35); border-radius:10px; padding:14px 20px;
  max-width:360px; width:100%;
}
#endBoard .big { font-size:34px; font-weight:900; color:var(--yellow); display:block; font-family:'Silkscreen',monospace; }
#endBoard .grade { font-size:17px; margin-bottom:4px; }
.eco-box {
  background:rgba(76,175,80,.12); border-radius:8px;
  padding:10px 14px; font-size:12px; color:#9f9;
  line-height:1.9; text-align:left; margin-top:8px;
  border:1px solid rgba(76,175,80,.2);
}
.eco-box b { color:var(--yellow); }
#cursor {
  position:absolute; transform:translate(-50%,-50%) rotate(-45deg);
  pointer-events:none; font-size:22px; z-index:999;
  filter:drop-shadow(0 0 6px rgba(255,220,0,.8));
}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="flashOverlay"></div>
  <div id="cursor">🔪</div>
  <div id="hud">
    <div id="hudRow1">
      <div id="scoreBox">
        <div class="lbl">得分</div>
        <div class="val" id="scoreVal">0</div>
      </div>
      <div id="nutriBar">
        <div id="nutriLabel">
          <span>🥗 今日營養攝取</span>
          <span id="nutriPct">0%</span>
        </div>
        <div id="nutriTrack">
          <div id="nutriFill"></div>
          <div id="nutriFood"></div>
        </div>
      </div>
      <div id="livesBox">
        <span class="heart" id="h0">❤️</span>
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
      </div>
    </div>
    <div id="wasteRow">
      <span id="wasteLabel">⚠️ 剩食累積</span>
      <div id="wasteTrack"><div id="wasteFill"></div></div>
      <span id="wasteCount">0 / 5 份</span>
    </div>
  </div>
  <div id="comboDisplay" style="display:none"></div>
  <div id="infoPanel">
    <div id="infoTitle"></div>
    <div id="infoText"></div>
  </div>
  <div id="overlay">
    <h1>🍱 午餐忍者</h1>
    <p class="subtitle">
      揮動刀光切出健康食材，集滿營養條即可過關！<br>
      沒切到或多切的食材會變成剩食，累積 5 份剩食就提早結束 🌱
    </p>
    <div class="legend-row">
      <span class="ltag green">🌱 在地食材 15–20分</span>
      <span class="ltag yellow">🌍 非在地 8–10分</span>
      <span class="ltag gray">⚠️ 剩食 = 累積廚餘</span>
      <span class="ltag red">💣 炸彈 = 扣生命</span>
    </div>
    <button class="btn btn-green" onclick="startGame()">開始遊戲 ▶</button>
  </div>
</div>
<script>
const FOODS = [
  {emoji:'🥕',name:'紅蘿蔔', color:'#ff7043',pts:20,nutri:8, local:true, tip:'🌱 台灣在地！碳足跡低，β-胡蘿蔔素保護眼睛，支持在地農業！'},
  {emoji:'🍅',name:'番茄',   color:'#e53935',pts:18,nutri:7, local:true, tip:'🌱 台灣在地！茄紅素加熱後更好吸收，短途運輸減少碳排放。'},
  {emoji:'🐟',name:'鯖魚',   color:'#1565c0',pts:20,nutri:12,local:true, tip:'🌱 台灣近海漁獲！Omega-3有益大腦，選在地魚類更永續。'},
  {emoji:'🍠',name:'地瓜',   color:'#ef6c00',pts:18,nutri:10,local:true, tip:'🌱 台灣在地！耐旱好種、碳足跡極低，是超級永續食材！'},
  {emoji:'🥬',name:'小白菜', color:'#388e3c',pts:15,nutri:6, local:true, tip:'🌱 台灣在地葉菜！生長快速、在地供應，鈣質豐富助骨骼發育。'},
  {emoji:'🍄',name:'香菇',   color:'#795548',pts:18,nutri:7, local:true, tip:'🌱 台灣在地栽培！不需農藥、碳足跡低，還有植物性維生素D。'},
  {emoji:'🌽',name:'玉米',   color:'#f9a825',pts:15,nutri:8, local:true, tip:'🌱 台灣在地穀物！含葉黃素保護眼睛，選在地玉米減少進口碳排。'},
  {emoji:'🥜',name:'花生',   color:'#a0522d',pts:15,nutri:9, local:true, tip:'🌱 台灣在地豆類！植物蛋白豐富，種植還能固氮改善土壤。'},
  {emoji:'🥒',name:'小黃瓜', color:'#66bb6a',pts:15,nutri:5, local:true, tip:'🌱 台灣在地！水分充足、熱量低，在地生產碳足跡小。'},
  {emoji:'🥦',name:'花椰菜', color:'#4caf50',pts:10,nutri:7, local:false,tip:'🌍 非在地食材。維生素C豐富，但運輸距離長，碳足跡較高。'},
  {emoji:'🥚',name:'雞蛋',   color:'#fdd835',pts:10,nutri:9, local:false,tip:'🌍 完全蛋白質，含12種維生素，但飼養能源消耗較高。'},
  {emoji:'🍋',name:'檸檬',   color:'#f9a825',pts:8, nutri:4, local:false,tip:'🌍 維生素C豐富，但多為進口，運輸碳排相對較高。'},
];
const WASTE_TYPES = [
  {emoji:'🍟',name:'剩食薯條',   tip:'⚠️ 剩食警示！台灣每年約250萬噸食物浪費，珍惜食物從不剩餐做起！'},
  {emoji:'🍱',name:'剩下的便當', tip:'⚠️ 把午餐吃完！減少廚餘是最直接減少碳排放的行動之一。'},
  {emoji:'🍰',name:'高糖蛋糕',   tip:'⚠️ 高糖甜點熱量高、營養少，也會增加食品加工的碳足跡！'},
];
const WASTE_LIMIT=5, NUTRI_MAX=100;

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const wrapper=document.getElementById('gameWrapper');

let state,score,lives,combo,comboTimer;
let items,particles,slashTrail;
let spawnTimer,spawnRate;
let mX,mY,pX,pY,infoTimeout;
let nutriPct,wasteCnt,totalCut,localCut,bombHit,animId;

function resize(){const r=wrapper.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;}
window.addEventListener('resize',resize);resize();

function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('infoPanel').style.display='none';
  state='playing';score=0;lives=3;combo=1;comboTimer=0;
  items=[];particles=[];slashTrail=[];
  spawnTimer=0;spawnRate=85;mX=0;mY=0;pX=0;pY=0;
  nutriPct=0;wasteCnt=0;totalCut=0;localCut=0;bombHit=0;
  updateHUD();
  if(animId)cancelAnimationFrame(animId);
  loop();
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  for(let i=0;i<3;i++)document.getElementById('h'+i).textContent=i<lives?'❤️':'🖤';
  const pct=Math.min(100,Math.round(nutriPct));
  document.getElementById('nutriFill').style.width=pct+'%';
  document.getElementById('nutriPct').textContent=pct+'%';
  const wp=Math.min(100,(wasteCnt/WASTE_LIMIT)*100);
  document.getElementById('wasteFill').style.width=wp+'%';
  document.getElementById('wasteCount').textContent=wasteCnt+' / '+WASTE_LIMIT+' 份';
}

function showInfo(food,nutriAdd){
  const extra=nutriAdd>0?'  ＋'+nutriAdd+'% 營養':'';
  document.getElementById('infoTitle').textContent=food.emoji+' '+food.name+extra;
  document.getElementById('infoText').textContent=food.tip;
  document.getElementById('infoPanel').style.display='block';
  // also show on nutriBar
  if(nutriAdd>0)document.getElementById('nutriFood').textContent=food.name+' +'+nutriAdd+'%';
  clearTimeout(infoTimeout);
  infoTimeout=setTimeout(()=>{
    document.getElementById('infoPanel').style.display='none';
    document.getElementById('nutriFood').textContent='';
  },3000);
}

function showCombo(c){
  const el=document.getElementById('comboDisplay');
  el.style.display='block';el.style.opacity=1;
  el.textContent=c>=3?c+'× 連擊！':'';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity=0;setTimeout(()=>el.style.display='none',300);},700);
}

function flash(color,bg){
  const f=document.getElementById('flashOverlay');
  f.style.borderColor=color||'transparent';
  f.style.background=bg||'transparent';
  setTimeout(()=>{f.style.borderColor='transparent';f.style.background='transparent';},220);
}

function spawnItem(){
  const W=canvas.width,H=canvas.height;
  const x=60+Math.random()*(W-120);
  const r=Math.random();
  let type;
  if(r<0.10)type={emoji:'💣',name:'炸彈',isBomb:true,color:'#333'};
  else if(r<0.25)type={...WASTE_TYPES[Math.floor(Math.random()*WASTE_TYPES.length)],isWaste:true,color:'#666'};
  else type={...FOODS[Math.floor(Math.random()*FOODS.length)]};
  items.push({x,y:H+40,vx:(Math.random()-.5)*2.5,vy:-(7+Math.random()*5),
    rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.1,
    size:44+Math.random()*16,...type,cut:false,age:0});
}

function cutItem(item){
  if(item.cut)return;
  item.cut=true;totalCut++;
  if(item.isBomb){
    bombHit++;lives=Math.max(0,lives-1);combo=1;
    flash('#f00','rgba(200,0,0,.08)');
    for(let i=0;i<12;i++)spawnP(item.x,item.y,'#ff4400','💥');
  }else if(item.isWaste){
    wasteCnt++;flash('#888','rgba(100,100,100,.07)');
    for(let i=0;i<7;i++)spawnP(item.x,item.y,'#aaa','⚠️');
    showInfo(item,0);
  }else{
    const pts=item.pts*combo;
    score+=pts;nutriPct=Math.min(NUTRI_MAX,nutriPct+item.nutri);
    comboTimer=65;combo++;
    if(item.local)localCut++;
    for(let i=0;i<8;i++)spawnP(item.x,item.y,item.color,(item.local?'🌱':'')+'+'+pts);
    showInfo(item,item.nutri);
    if(combo>=3)showCombo(combo-1);
  }
  updateHUD();
  if(lives<=0){endGame('bomb');return;}
  if(wasteCnt>=WASTE_LIMIT){endGame('waste');return;}
  if(nutriPct>=NUTRI_MAX){endGame('clear');return;}
}

function spawnP(x,y,color,text){
  particles.push({x,y,vx:(Math.random()-.5)*5,vy:-(Math.random()*4+1),life:1,color,text,size:Math.random()*5+4});
}

function checkSlash(item){
  if(item.cut)return;
  const dx=mX-pX,dy=mY-pY;
  if(Math.sqrt(dx*dx+dy*dy)<5)return;
  const A=item.x-pX,B=item.y-pY,C=dx,D=dy;
  const dot=A*C+B*D,len=C*C+D*D;
  const t=Math.max(0,Math.min(1,len?dot/len:0));
  const dist=Math.sqrt((item.x-(pX+t*C))**2+(item.y-(pY+t*D))**2);
  if(dist<item.size*.62)cutItem(item);
}

function drawItem(item){
  ctx.save();ctx.translate(item.x,item.y);ctx.rotate(item.rot);
  if(item.isBomb){ctx.shadowColor='#f44';ctx.shadowBlur=14;}
  else if(item.isWaste){ctx.filter='grayscale(90%)';ctx.globalAlpha=.68;}
  else{
    ctx.shadowColor=item.color;ctx.shadowBlur=10;
    if(item.local){ctx.save();ctx.font='11px serif';ctx.shadowBlur=0;ctx.fillText('🌱',item.size*.5,-item.size*.45);ctx.restore();}
  }
  ctx.font=item.size+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(item.emoji,0,0);ctx.restore();
}

function drawSlash(){
  if(slashTrail.length<2)return;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,180,.9)';ctx.lineWidth=3;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.shadowColor='#ffe88a';ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(slashTrail[0].x,slashTrail[0].y);
  for(let i=1;i<slashTrail.length;i++){ctx.globalAlpha=(i/slashTrail.length)*.9;ctx.lineTo(slashTrail[i].x,slashTrail[i].y);}
  ctx.stroke();ctx.restore();
  slashTrail=slashTrail.slice(-14);
}

function loop(){
  if(state!=='playing')return;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d1a0d';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.strokeStyle='rgba(76,175,80,.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  ctx.restore();

  if(comboTimer>0){comboTimer--;if(comboTimer===0)combo=1;}
  spawnTimer++;
  if(spawnTimer>=spawnRate){spawnTimer=0;spawnItem();if(score>200)spawnRate=Math.max(42,spawnRate-1);}

  items=items.filter(item=>{
    if(item.cut)return false;
    item.vy+=.18;item.x+=item.vx;item.y+=item.vy;item.rot+=item.rotV;item.age++;
    if(item.y>H+90){
      if(!item.isBomb&&!item.isWaste){
        wasteCnt++;
        spawnP(item.x,H-10,'#aaa','🍟 剩食+1');
        updateHUD();
        if(wasteCnt>=WASTE_LIMIT){endGame('waste');return false;}
      }
      return false;
    }
    checkSlash(item);drawItem(item);return true;
  });

  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.025;
    if(p.life<=0)return false;
    ctx.save();ctx.globalAlpha=p.life;
    ctx.font='bold '+(p.size+10)+'px Noto Sans TC,sans-serif';
    ctx.fillStyle=p.color;ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);ctx.restore();
    return true;
  });

  drawSlash();pX=mX;pY=mY;
  animId=requestAnimationFrame(loop);
}

function endGame(reason){
  state='idle';cancelAnimationFrame(animId);
  const localRate=(totalCut-wasteCnt)>0?Math.round(localCut/(totalCut-wasteCnt)*100):0;
  let headline,grade,reasonMsg;
  if(reason==='clear'){
    headline='🎉 過關！今日營養達標！';
    grade=score>=600?'🌟 永續飲食達人':score>=350?'🥗 均衡小廚師':'🌱 環保新手';
    reasonMsg='你成功集滿今天的營養需求，棒棒！';
  }else if(reason==='waste'){
    headline='⚠️ 剩食太多！遊戲結束';
    grade='🗑️ 廚餘製造者';
    reasonMsg='累積了 '+wasteCnt+' 份剩食，地球很受傷…下次記得吃完！';
  }else{
    headline='💥 被炸倒了！遊戲結束';
    grade='😵 被炸暈的忍者';
    reasonMsg='生命值歸零！下次要避開炸彈。';
  }
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1>${headline}</h1>
    <div id="endBoard">
      <span class="big">${score}</span>
      <div class="grade">${grade}</div>
      <div style="font-size:12px;color:#aaa;margin-bottom:6px">${reasonMsg}</div>
      <div>切中食材 ${totalCut} 項　｜　在地食材 ${localRate}%</div>
      <div>剩食累積 ${wasteCnt} 份　｜　被炸 ${bombHit} 次</div>
      <div>最終營養 ${Math.round(nutriPct)}%</div>
      <div class="eco-box">
        💡 <b>永續飲食小知識</b><br>
        選在地食材可減少最多 <b>70%</b> 的運輸碳排放<br>
        台灣每年食物浪費 <b>250 萬公噸</b>，相當於 650 座台北 101<br>
        每少一份剩食，就少排放約 <b>2.5 kg CO₂</b> 🌍
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-green" onclick="startGame()">再玩一次 ▶</button>
    </div>
  `;
  ov.style.display='flex';
}

const cursor=document.getElementById('cursor');
wrapper.addEventListener('mousemove',e=>{
  const r=wrapper.getBoundingClientRect();
  mX=(e.clientX-r.left)*(canvas.width/r.width);
  mY=(e.clientY-r.top)*(canvas.height/r.height);
  cursor.style.left=(e.clientX-r.left)+'px';
  cursor.style.top=(e.clientY-r.top)+'px';
  if(state==='playing')slashTrail.push({x:mX,y:mY});
});
wrapper.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=wrapper.getBoundingClientRect(),t=e.touches[0];
  mX=(t.clientX-r.left)*(canvas.width/r.width);
  mY=(t.clientY-r.top)*(canvas.height/r.height);
  cursor.style.left=(t.clientX-r.left)+'px';
  cursor.style.top=(t.clientY-r.top)+'px';
  if(state==='playing')slashTrail.push({x:mX,y:mY});
},{passive:false});
</script>
</body>
