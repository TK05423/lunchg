<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍱 午餐忍者</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Silkscreen&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="flashOverlay"></div>
  <div id="cursor">🔪</div>
  <div id="hud">
    <div id="hudRow1">
      <div id="scoreBox">
        <div class="lbl">得分</div>
        <div class="val" id="scoreVal">0</div>
      </div>
      <div id="nutriBar">
        <div id="nutriLabel">
          <span>🥗 今日營養攝取</span>
          <span id="nutriPct">0%</span>
        </div>
        <div id="nutriTrack">
          <div id="nutriFill"></div>
          <div id="nutriFood"></div>
        </div>
      </div>
      <div id="livesBox">
        <span class="heart" id="h0">❤️</span>
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
      </div>
    </div>
    <div id="wasteRow">
      <span id="wasteLabel">⚠️ 剩食累積</span>
      <div id="wasteTrack"><div id="wasteFill"></div></div>
      <span id="wasteCount">0 / 5 份</span>
    </div>
  </div>
  <div id="comboDisplay" style="display:none"></div>
  <div id="infoPanel">
    <div id="infoTitle"></div>
    <div id="infoText"></div>
  </div>
  
  <!-- Main overlay for introduction and final results -->
  <div id="overlay">
    <h1>🍱 午餐忍者</h1>
    <p class="subtitle">
      揮動刀光切出健康食材，集滿營養條即可過關！<br>
      沒切到或多切的食材會變成剩食，累積 5 份剩食就提早結束 🌱
    </p>
    <div class="legend-row">
      <span class="ltag green">🌱 在地食材 15–20分</span>
      <span class="ltag yellow">🌍 非在地 8–10分</span>
      <span class="ltag gray">⚠️ 剩食 = 累積廚餘</span>
      <span class="ltag red">💣 炸彈 = 扣生命</span>
    </div>
    <button class="btn btn-green" onclick="startGame()">開始遊戲 ▶</button>
  </div>
  
  <!-- Quiz Overlay -->
  <div id="quizOverlay" style="display:none; position:absolute; inset:0; background:rgba(10,22,10,.96); border-radius:16px; flex-direction:column; align-items:center; justify-content:center; padding:24px; z-index:100; box-shadow:inset 0 0 40px rgba(76,175,80,.15);">
    <div style="width:100%; max-width:480px; display:flex; flex-direction:column; gap:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="quizProgress" style="font-size:12px; font-weight:700; color:var(--yellow); background:rgba(255,224,102,.1); border:1px solid rgba(255,224,102,.3); padding:4px 10px; border-radius:20px; font-family:'Silkscreen', monospace;">QUESTION 1 / 5</span>
        <span id="quizSource" style="font-size:11px; color:#aaa; background:rgba(255,255,255,.08); padding:4px 10px; border-radius:20px;">食材相關題</span>
      </div>
      <div id="quizQuestion" style="font-size:15px; font-weight:700; color:#fff; line-height:1.6; background:rgba(0,0,0,.4); padding:16px; border-radius:12px; border:1px solid rgba(76,175,80,.2); min-height:80px; display:flex; align-items:center; text-shadow:0 1px 2px rgba(0,0,0,.8);">
        這裡會顯示問題的內容？
      </div>
      <div id="quizChoices" style="display:flex; flex-direction:column; gap:8px; margin-top:6px;">
        <!-- Dynamic choice buttons -->
      </div>
      <div id="quizFeedback" style="display:none; font-size:13px; font-weight:700; border-radius:10px; padding:10px 14px; text-align:center; min-height:40px; transition:all 0.2s;">
        答對了！加 100 分 🎉
      </div>
      <button id="quizNextBtn" class="btn btn-blue" style="display:none; align-self:center; margin-top:8px; padding:10px 32px; font-size:15px;" onclick="nextQuestion()">下一題 ➔</button>
    </div>
  </div>
</div>

<!-- Load JavaScript modules in sequential order -->
<script src="js/data.js"></script>
<script src="js/game.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
